version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      angular:
        patterns: ["@angular/*", "@angular-devkit/*", "ng-packagr"]
      dev-dependencies:
        dependency-type: development
    ignore:
      # Each Angular major is pinned to one line of this library; major bumps are handled manually.
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "github-actions"]
