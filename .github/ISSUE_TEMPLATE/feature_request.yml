name: ✨ Feature request
description: Propose a new capability or API.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For new public API (component inputs/outputs, engine methods, tools/filters) we agree on the
        **shape first** — it's a semver contract. Describe the use-case before the implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use-case
      description: What are you trying to do that the library doesn't let you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: How would you want it to look? Sketch the input/output/method signature.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other API shapes you weighed.
  - type: dropdown
    id: belongs
    attributes:
      label: Where does this belong?
      description: Is this in scope for this library, or upstream (Fabric.js / Angular)?
      options:
        - This library
        - Upstream (Fabric.js / Angular) — filing here to discuss
        - Not sure
    validations:
      required: true
