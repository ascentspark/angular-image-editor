<button
  type="button"
  class="asp-layers__head"
  [attr.aria-expanded]="!collapsed()"
  (click)="toggle()"
>
  <span class="asp-layers__title">Layers</span>
  <asp-icon [name]="collapsed() ? 'chevron-up' : 'chevron-down'" [size]="15" />
</button>

@if (!collapsed()) {
  <!-- object-ops act on the current selection -->
  <div class="asp-layers__ops">
    <div class="asp-layers__opsrow">
      <button
        type="button"
        class="asp-layers__op"
        title="Group"
        aria-label="Group selection"
        [disabled]="!hasSelection()"
        (click)="groupSelection.emit()"
      >
        <asp-icon name="group" [size]="15" />
      </button>
      <button
        type="button"
        class="asp-layers__op"
        title="Ungroup"
        aria-label="Ungroup"
        [disabled]="!hasSelection()"
        (click)="ungroupSelection.emit()"
      >
        <asp-icon name="layers" [size]="15" />
      </button>
      <div class="asp-layers__align">
        <button
          type="button"
          class="asp-layers__op"
          title="Align"
          aria-label="Align"
          [attr.aria-expanded]="alignOpen()"
          [disabled]="!hasSelection()"
          (click)="toggleAlign()"
        >
          <asp-icon name="align-horizontal-distribute-center" [size]="15" />
        </button>
        @if (alignOpen()) {
          <button type="button" class="asp-layers__scrim" aria-label="Close" (click)="toggleAlign()"></button>
          <div class="asp-layers__alignmenu" role="menu">
            <button type="button" role="menuitem" (click)="emitAlign('left')">Left</button>
            <button type="button" role="menuitem" (click)="emitAlign('center-h')">Center</button>
            <button type="button" role="menuitem" (click)="emitAlign('right')">Right</button>
            <button type="button" role="menuitem" (click)="emitAlign('top')">Top</button>
            <button type="button" role="menuitem" (click)="emitAlign('center-v')">Middle</button>
            <button type="button" role="menuitem" (click)="emitAlign('bottom')">Bottom</button>
          </div>
        }
      </div>
      <button
        type="button"
        class="asp-layers__op"
        title="Duplicate"
        aria-label="Duplicate"
        [disabled]="!hasSelection()"
        (click)="duplicateSelection.emit()"
      >
        <asp-icon name="copy" [size]="15" />
      </button>
      <button
        type="button"
        class="asp-layers__op asp-layers__op--danger"
        title="Delete"
        aria-label="Delete"
        [disabled]="!hasSelection()"
        (click)="deleteSelection.emit()"
      >
        <asp-icon name="trash-2" [size]="15" />
      </button>
    </div>

    <div class="asp-layers__opacity">
      <span class="asp-layers__opacity-label">Opacity</span>
      <input
        type="range"
        class="asp-range"
        min="0"
        max="100"
        [value]="opacityPct()"
        [disabled]="!hasSelection()"
        (input)="onOpacityInput($event)"
        (change)="onOpacityCommit($event)"
        aria-label="Layer opacity"
      />
      <span class="asp-layers__opacity-value">{{ opacityPct() }}</span>
    </div>
  </div>

  <div class="asp-layers__scroll">
    @for (layer of layers(); track layer.id) {
      <div
        class="asp-layers__row"
        [class.asp-layers__row--selected]="layer.selected"
        [class.asp-layers__row--dragging]="draggingId() === layer.id"
        [class.asp-layers__row--drop-above]="dropTargetId() === layer.id && dropAbove()"
        [class.asp-layers__row--drop-below]="dropTargetId() === layer.id && !dropAbove()"
        [draggable]="editingId() !== layer.id"
        (dragstart)="onDragStart(layer.id, $event)"
        (dragover)="onDragOver(layer.id, $event)"
        (drop)="onDrop(layer.id, $event)"
        (dragend)="onDragEnd()"
      >
        <span class="asp-layers__grip" aria-hidden="true" title="Drag to reorder">
          <asp-icon name="grip-vertical" [size]="14" />
        </span>
        @if (editingId() === layer.id) {
          <input
            class="asp-layers__rename-input"
            type="text"
            [value]="editValue()"
            (input)="onRenameInput($event)"
            (keydown.enter)="commitRename(layer)"
            (keydown.escape)="cancelRename()"
            (blur)="commitRename(layer)"
            aria-label="Layer name"
          />
        } @else {
          <button
            type="button"
            class="asp-layers__name"
            [disabled]="layer.locked"
            (click)="onSelect(layer.id, $event)"
            (dblclick)="startRename(layer)"
            [attr.aria-pressed]="layer.selected"
            title="Click to select · double-click to rename"
          >
            {{ layer.label }}
          </button>
        }
        <div class="asp-layers__actions">
          <button
            type="button"
            class="asp-layers__btn"
            [attr.title]="layer.visible ? 'Hide' : 'Show'"
            [attr.aria-label]="layer.visible ? 'Hide layer' : 'Show layer'"
            (click)="toggleVisible.emit(layer.id)"
          >
            <asp-icon [name]="layer.visible ? 'eye' : 'eye-off'" [size]="15" />
          </button>
          <button
            type="button"
            class="asp-layers__btn"
            [class.asp-layers__btn--on]="layer.locked"
            [attr.title]="layer.locked ? 'Unlock' : 'Lock'"
            [attr.aria-label]="layer.locked ? 'Unlock layer' : 'Lock layer'"
            (click)="toggleLock.emit(layer.id)"
          >
            <asp-icon [name]="layer.locked ? 'lock' : 'lock-open'" [size]="15" />
          </button>
          <button
            type="button"
            class="asp-layers__btn"
            title="Bring forward"
            aria-label="Bring forward"
            (click)="moveUp.emit(layer.id)"
          >
            <asp-icon name="chevron-up" [size]="15" />
          </button>
          <button
            type="button"
            class="asp-layers__btn"
            title="Send backward"
            aria-label="Send backward"
            (click)="moveDown.emit(layer.id)"
          >
            <asp-icon name="chevron-down" [size]="15" />
          </button>
        </div>
      </div>
    }
  </div>
}
