<main class="page" [class.page--dark]="mode() === 'dark'">
  <h1>&#64;ascentspark/angular-image-editor — demo</h1>

  <nav class="views">
    <button type="button" class="chip" [class.chip--active]="view() === 'theme'" (click)="setView('theme')">
      Theming
    </button>
    <button type="button" class="chip" [class.chip--active]="view() === 'engine'" (click)="setView('engine')">
      Engine (Phase 3)
    </button>
  </nav>

  @if (view() === 'engine') {
    <p class="lede">Phase 3: EditorEngine on Fabric.js v7 — load, transform, filter, crop, undo, export.</p>
    <demo-engine-harness></demo-engine-harness>
  } @else {
  <p class="lede">Phase 1: 3-input theming. Pick a preset or custom colors and toggle light/dark.</p>

  <section class="controls">
    @for (preset of presets; track preset.label) {
      <button type="button" class="chip" (click)="applyPreset(preset)">{{ preset.label }}</button>
    }
    <label class="field">Base <input type="color" [value]="base()" (input)="onBaseInput($event)" /></label>
    <label class="field">Accent <input type="color" [value]="accent()" (input)="onAccentInput($event)" /></label>
    <button type="button" class="chip chip--toggle" (click)="toggleMode()">
      Mode: {{ mode() }}
    </button>
  </section>

  <asp-image-editor
    [baseColor]="base()"
    [accentColor]="accent()"
    [themeMode]="mode()"
  ></asp-image-editor>
  }
</main>
