<main class="page" [class.page--dark]="themeMode() === 'dark'">
  <h1>&#64;ascentspark/angular-image-editor — demo</h1>
  <p class="lede">Advanced workspace on Fabric.js v7, fully themed from 3 inputs.</p>

  <section class="controls">
    @for (preset of presets; track preset.label) {
      <button type="button" class="chip" (click)="applyPreset(preset)">{{ preset.label }}</button>
    }
    <label class="field">Base <input type="color" [value]="base()" (input)="onBaseInput($event)" /></label>
    <label class="field">Accent <input type="color" [value]="accent()" (input)="onAccentInput($event)" /></label>
    <button type="button" class="chip chip--toggle" (click)="toggleMode()">Mode: {{ themeMode() }}</button>
  </section>

  <section class="controls">
    <button type="button" class="chip" (click)="openDialog()">Open basic dialog</button>
    @if (lastResult()) {
      <span class="controls__label">→ {{ lastResult() }}</span>
    }
  </section>

  <section class="controls">
    <span class="controls__label">Editor mode:</span>
    @for (m of editorModes; track m) {
      <button
        type="button"
        class="chip"
        [class.chip--active]="editorMode() === m"
        (click)="setEditorMode(m)"
      >
        {{ m }}
      </button>
    }
  </section>

  <div class="editor-box">
    <asp-image-editor
      [mode]="editorMode()"
      [baseColor]="base()"
      [accentColor]="accent()"
      [themeMode]="themeMode()"
      (saved)="onSaved($event)"
    ></asp-image-editor>
  </div>
</main>
