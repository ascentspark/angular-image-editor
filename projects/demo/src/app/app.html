<header class="hdr">
  <div class="hdr__brand">
    <a routerLink="/" class="hdr__logo" aria-label="Angular Image Editor home">
      <img src="image-editor-logo.png" alt="Angular Image Editor" />
    </a>
    <span class="hdr__tagline">
      for Angular 22 · built on
      <a href="https://fabricjs.com" target="_blank" rel="noopener">Fabric.js v7</a>
    </span>
  </div>

  <div class="hdr__meta">
    <a
      href="https://github.com/ascentspark/angular-image-editor"
      target="_blank"
      rel="noopener"
      class="hdr__link"
    >
      GitHub
    </a>
    <a
      href="https://ascentspark.com"
      target="_blank"
      rel="noopener"
      class="hdr__maintainer"
      aria-label="Ascentspark"
    >
      <img src="asc-logo-full.svg" alt="Ascentspark" class="hdr__asc" />
    </a>
    <button type="button" class="hdr__dark" (click)="toggleDark()">
      {{ dark() ? 'Light' : 'Dark' }}
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    @for (group of nav; track group.title) {
      <nav class="navgroup">
        <h3 class="navgroup__title">{{ group.title }}</h3>
        <ul class="navgroup__list">
          @for (item of group.items; track item.path) {
            <li>
              <a
                class="navlink"
                [routerLink]="'/' + item.path"
                routerLinkActive="navlink--active"
                [routerLinkActiveOptions]="{ exact: item.path === '' }"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
    }
  </aside>

  <main class="main">
    <router-outlet />
  </main>
</div>

<footer class="footer">
  <a href="https://ascentspark.com" target="_blank" rel="noopener" class="footer__brand">
    <span class="footer__label">Open Source project by</span>
    <img src="asc-logo-full.svg" alt="Ascentspark" class="footer__logo" />
  </a>
</footer>
